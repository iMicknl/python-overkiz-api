version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    # Only update uv.lock; never raise the abstract lower bounds in
    # pyproject.toml. As a library we want a wide compatibility range for
    # downstream consumers (e.g. Home Assistant), while still testing against
    # the latest pinned versions via the lockfile.
    versioning-strategy: lockfile-only
    schedule:
      interval: "weekly"
      time: "08:00"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "08:00"
    open-pull-requests-limit: 10
    groups:
      # init and analyze are separate action paths but the same repo pinned to
      # one SHA, so they must bump together in a single PR.
      codeql-action:
        patterns:
          - "github/codeql-action*"

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: weekly
