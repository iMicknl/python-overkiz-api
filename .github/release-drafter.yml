name-template: 'v$NEXT_PATCH_VERSION'
tag-template: 'v$NEXT_PATCH_VERSION'
exclude-labels:
  - 'skip-changelog'
  - 'Meta: Exclude From Changelog'
categories:
  - title: ":boom: Breaking Changes"
    label: "breaking"
  - title: ":rocket: New Features"
    label: "feature"
  - title: ":bug: Bug Fixes"
    label: "bug"
  - title: ":broom: Code Quality"
    label: "code-quality"
  - title: ":package: Dependencies"
    label: "dependencies"
  - title: ":books: Documentation"
    label: "documentation"
# Labels are applied automatically from the PR title (Conventional Commits).
# release-drafter places a PR in the FIRST matching category top-to-bottom, so a
# breaking change (a `!` in the prefix) routes to Breaking Changes even though it
# also carries its own type label (e.g. `feature`).
autolabeler:
  - label: "breaking"
    title:
      - '/^\w+(\(.+\))?!:/'
  - label: "feature"
    title:
      - '/^feat(\(.+\))?!?:/'
  - label: "bug"
    title:
      - '/^fix(\(.+\))?!?:/'
  - label: "code-quality"
    title:
      - '/^(refactor|perf|style|test|ci|chore)(\(.+\))?!?:/'
  - label: "documentation"
    title:
      - '/^docs(\(.+\))?!?:/'
  - label: "dependencies"
    branch:
      - '/^dependabot\//'
    title:
      - '/^build\(deps\)/'
# Strip the Conventional-Commit prefix from rendered entries: the prefix is needed
# in the PR title for autolabeling, but is redundant once an entry is filed under its
# section (e.g. "feat:" under New Features). "feat: Add X" renders as "Add X".
replacers:
  - search: '/\* (build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\(.+?\))?!?:\s*/g'
    replace: '* '
template: |
  ## What's changed

  $CHANGES

  ## Contributors to this release

  $CONTRIBUTORS
